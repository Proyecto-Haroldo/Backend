spring.application.name=backend
server.port=${PORT:8080}

microservice.ia.url=${MICROSERVICE_IA_URL}

jwt.secret=${JWT_SECRET}

# Database configuration >:3
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.leak-detection-threshold=30000
spring.datasource.hikari.max-lifetime=1800000

spring.task.scheduling.pool.size=1

#JPA Stuff
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Redis Configuration
redis.base.url=${REDIS_BASE_URL}
redis.bearer.token=${REDIS_BEARER_TOKEN}

# Gmail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Google Calendar: classpath:... (Docker/JAR) or filesystem path (local dev). Virtual meetings require this.
google.calendar.service-account-key-path=${GOOGLE_CALENDAR_SERVICE_ACCOUNT_KEY_PATH:classpath:google-service-account.json}
google.calendar.calendar-id=${GOOGLE_CALENDAR_ID:}