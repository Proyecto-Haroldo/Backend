services:
  backend:
    build: .
    container_name: backend-haroldo
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://aws-0-us-east-2.pooler.supabase.com:6543/postgres?preferQueryMode=simple
      SPRING_DATASOURCE_USERNAME: postgres.umtlidnqgmsutxwmljyx
      SPRING_DATASOURCE_PASSWORD: ${DBPASSWORD}
      MICROSERVICE_IA_URL: http://microservicio-ia:8080/ia/recomendacion
      REDIS_BASE_URL: https://helped-cockatoo-53634.upstash.io
      REDIS_BEARER_TOKEN: ${REDIS_BEARER_TOKEN}
    depends_on:
      - microservicio-ia
    networks:
      - haroldo-network
    dns:
      - 8.8.8.8
      - 8.8.4.4

  microservicio-ia:
    build: ../IA-Microservice
    container_name: microservicio-ia-haroldo
    ports:
      - "8081:8080"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    networks:
      - haroldo-network

  frontend:
    build: ../Frontend
    container_name: frontend-haroldo
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - haroldo-network

networks:
  haroldo-network:
    driver: bridge